<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Version History — Lite Article Exporter</title>
    <style>
      :root {
        --page-bg: #f4efe7;
        --panel-bg: rgba(248, 244, 238, 0.96);
        --panel-strong: rgba(255, 252, 247, 0.98);
        --border: rgba(76, 66, 56, 0.1);
        --shadow: 0 24px 60px rgba(31, 24, 18, 0.12);
        --text: #28211c;
        --muted: rgba(77, 66, 55, 0.72);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        padding: 48px 18px 60px;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.32), transparent 28%),
          radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.18), transparent 24%),
          var(--page-bg);
        color: var(--text);
        font: 15px/1.6 "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      .page-header {
        margin-bottom: 32px;
      }

      .eyebrow {
        margin-bottom: 8px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .page-title {
        font-size: 34px;
        font-weight: 700;
        line-height: 1.1;
        color: var(--text);
      }

      .version-section {
        padding: 24px 0;
        border-top: 1px solid var(--border);
      }

      .version-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 14px;
      }

      .version-heading {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }

      .version-date {
        flex-shrink: 0;
        font-size: 13px;
        color: var(--muted);
      }

      .changelog-items {
        list-style: disc;
        padding-left: 20px;
        display: grid;
        gap: 6px;
      }

      .changelog-items li {
        color: var(--text);
        line-height: 1.55;
      }

      @media (max-width: 640px) {
        body {
          padding: 32px 16px 48px;
        }

        .page-title {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <div class="eyebrow">Lite Article Exporter</div>
        <h1 class="page-title" id="page-title"></h1>
      </div>
      <div id="changelogList"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
  </html>
